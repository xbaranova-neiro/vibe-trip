<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Вайб-трип — День 1 · Куда тебя несёт?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: linear-gradient(150deg, #fffbf5 0%, #fff4ea 38%, #f0f9ff 100%);
      --card: #fffdf9;
      --accent: #f97316;
      --accent2: #0ea5e9;
      --text: #1c1917;
      --muted: #78716c;
      --radius: 18px;
      --shadow: 0 12px 40px rgba(249, 115, 22, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      color: var(--text);
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 1rem 1rem 2.5rem;
    }
    header {
      text-align: center;
      padding: 0.5rem 0 1rem;
    }
    header h1 {
      font-size: clamp(1.35rem, 4vw, 1.75rem);
      margin: 0 0 0.35rem;
      font-weight: 800;
      line-height: 1.2;
    }
    header p {
      margin: 0;
      color: var(--muted);
      font-weight: 600;
      font-size: 0.95rem;
    }
    .progress {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 1.25rem;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(26, 35, 126, 0.15);
      transition: transform 0.2s, background 0.2s;
    }
    .dot.on {
      background: var(--accent);
      transform: scale(1.15);
    }
    .step-title {
      font-size: 1.05rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
      text-align: center;
    }
    .grid {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 400px) {
      .grid.cols-2 { grid-template-columns: 1fr 1fr; }
    }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 14px 12px;
      box-shadow: var(--shadow);
      border: 2px solid transparent;
      cursor: pointer;
      text-align: left;
      transition: border 0.15s, transform 0.15s;
      appearance: none;
      font: inherit;
      color: inherit;
      width: 100%;
    }
    .card:hover, .card:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(124, 77, 255, 0.35);
      outline: none;
    }
    .card.selected {
      border-color: var(--accent2);
      background: #f3e5f5;
    }
    .card .row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .card .emoji { font-size: 1.75rem; line-height: 1; }
    .card .name { font-weight: 800; font-size: 1rem; }
    .card .joke {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.35;
    }
    .nav-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 1.25rem;
    }
    .btn {
      border: none;
      border-radius: 999px;
      padding: 12px 20px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(135deg, #ff6b9d, #ff8a65);
      color: #fff;
      box-shadow: 0 8px 24px rgba(255, 107, 157, 0.45);
      flex: 1;
    }
    .btn-ghost {
      background: rgba(255, 255, 255, 0.7);
      color: var(--text);
      border: 2px solid rgba(26, 35, 126, 0.12);
    }
    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }
    .result {
      text-align: center;
      animation: pop 0.5s ease;
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.94); }
      to { opacity: 1; transform: scale(1); }
    }
    .price-box {
      background: var(--card);
      border-radius: 24px;
      padding: 1.5rem;
      box-shadow: var(--shadow);
      margin: 1rem 0;
    }
    .price-num {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 800;
      color: var(--accent2);
    }
    .code-box {
      background: linear-gradient(135deg, #ede7f6, #e1f5fe);
      border-radius: var(--radius);
      padding: 1rem;
      margin: 1rem 0;
      word-break: break-all;
      font-weight: 800;
      font-size: clamp(0.95rem, 3vw, 1.1rem);
      letter-spacing: 0.02em;
      border: 2px dashed var(--accent2);
    }
    .hint {
      font-size: 0.95rem;
      color: var(--muted);
      margin: 0.75rem 0 1rem;
      font-weight: 600;
    }
    .hidden { display: none !important; }
    .gate {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      text-align: center;
    }
    .gate-inner {
      max-width: 420px;
      background: var(--card);
      padding: 1.75rem;
      border-radius: 24px;
      box-shadow: var(--shadow);
    }
    .gate-inner h2 { margin: 0 0 0.75rem; font-size: 1.35rem; }
    .gate-inner p { margin: 0.5rem 0; color: var(--muted); font-weight: 600; line-height: 1.45; }
    .gate-inner code { background: rgba(26, 35, 126, 0.08); padding: 2px 8px; border-radius: 8px; }
    .pulse {
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }
  </style>
  <link rel="stylesheet" href="vibe-ui.css?v=8" />
</head>
<body class="vibe-trip" data-vibe-day="1">
  <script src="splash.js"></script>
  <div id="campaignGate" class="gate hidden" role="dialog" aria-live="polite">
    <div class="gate-inner">
      <h2>Ещё рано 🌱</h2>
      <p>Всё начнётся уже завтра.</p>
    </div>
  </div>

  <div id="appRoot" class="wrap">
    <header>
      <h1>Куда тебя несёт?</h1>
      <p>День 1 · Собери поездку мечты</p>
    </header>

    <section id="flow">
      <div class="progress" id="dots" aria-hidden="true"></div>
      <p class="step-title" id="stepTitle"></p>
      <div class="grid" id="grid"></div>
      <div class="nav-row">
        <button type="button" class="btn btn-ghost" id="backBtn">Назад</button>
        <button type="button" class="btn btn-primary" id="nextBtn" disabled>Дальше</button>
      </div>
    </section>

    <section id="resultScreen" class="hidden">
      <div class="result">
        <p class="result-kicker">Маршрут собран</p>
        <div class="price-box">
          <p class="result-label">Твоя поездка мечты стоит</p>
          <p class="price-num" id="priceOut">~0 ₽</p>
          <p class="result-note">на двоих</p>
        </div>
        <p class="hint">Твой уникальный код поездки:</p>
        <div class="code-box" id="codeOut"></div>
        <button type="button" class="btn btn-primary btn-block" id="copyBtn">Скопировать код</button>
        <p class="hint pulse">Запомни этот код — завтра он тебе пригодится 😏</p>
        <a class="btn btn-primary btn-block" id="day2Link" href="#">День 2: А хватит ли денег?</a>
      </div>
    </section>
  </div>

  <script src="pricing.js"></script>
  <script src="vibe-fx.js?v=7"></script>
  <script>
    (function () {
      const P = window.VibeTripPricing;
      const preview = P.isPreviewUnlock(window.location.search);
      const cal = P.getMaxAppDayByCalendar();
      if (!preview && cal < 1) {
        document.getElementById('campaignGate').classList.remove('hidden');
        document.getElementById('appRoot').classList.add('hidden');
        return;
      }
    })();
  </script>
  <script>
    (function () {
      const P = window.VibeTripPricing;
      const L = P.LABELS;

      const steps = [
        {
          title: 'Шаг 1. Страна',
          key: 'country',
          gridClass: 'cols-2',
          options: [
            { id: 'TH', ...L.countries.TH },
            { id: 'TR', ...L.countries.TR },
            { id: 'ID', ...L.countries.ID },
            { id: 'AE', ...L.countries.AE },
            { id: 'GE', ...L.countries.GE },
          ].map((o) => ({
            value: o.id,
            primary: o.flag + ' ' + o.name,
            sub: o.joke,
            emoji: o.flag,
          })),
        },
        {
          title: 'Шаг 2. Уровень отеля',
          key: 'hotel',
          gridClass: 'cols-2',
          options: [
            { value: '1star', primary: L.hotels['1star'].stars + ' Одна звезда', sub: L.hotels['1star'].joke },
            { value: '3star', primary: L.hotels['3star'].stars + ' Три звезды', sub: L.hotels['3star'].joke },
            { value: '5star', primary: L.hotels['5star'].stars + ' Пять звёзд', sub: L.hotels['5star'].joke },
            { value: 'hostel', primary: L.hotels.hostel.stars + ' Хостел', sub: L.hotels.hostel.joke },
          ],
        },
        {
          title: 'Шаг 3. Питание',
          key: 'food',
          gridClass: '',
          options: [
            { value: 'AI', primary: L.food.AI.icon + ' All inclusive', sub: L.food.AI.joke },
            { value: 'shop', primary: L.food.shop.icon + ' Сам купил в магазе', sub: L.food.shop.joke },
            { value: 'noodle', primary: L.food.noodle.icon + ' Доширак из номера', sub: L.food.noodle.joke },
            { value: 'cafe', primary: L.food.cafe.icon + ' Локальные кафешки', sub: L.food.cafe.joke },
          ],
        },
        {
          title: 'Шаг 4. Линия от моря',
          key: 'sea',
          gridClass: '',
          options: [
            { value: '1line', primary: L.sea['1line'].icon + ' Первая линия', sub: L.sea['1line'].joke },
            { value: '5min', primary: L.sea['5min'].icon + ' 5 минут пешком', sub: L.sea['5min'].joke },
            { value: 'bus', primary: L.sea.bus.icon + ' На автобусе до моря', sub: L.sea.bus.joke },
          ],
        },
        {
          title: 'Шаг 5. Экскурсии',
          key: 'exc',
          gridClass: '',
          options: [
            { value: 'e0', primary: '0 — без экскурсий', sub: L.exc.e0.joke },
            { value: 'e2', primary: '1–2 экскурсии', sub: L.exc.e2.joke },
            { value: 'e5', primary: '5+ экскурсий', sub: L.exc.e5.joke },
          ],
        },
      ];

      let stepIndex = 0;
      const choices = {};
      let autoAdvanceTimer;

      const dotsEl = document.getElementById('dots');
      const stepTitleEl = document.getElementById('stepTitle');
      const gridEl = document.getElementById('grid');
      const nextBtn = document.getElementById('nextBtn');
      const backBtn = document.getElementById('backBtn');
      const flowEl = document.getElementById('flow');
      const resultEl = document.getElementById('resultScreen');
      const priceOut = document.getElementById('priceOut');
      const codeOut = document.getElementById('codeOut');
      const copyBtn = document.getElementById('copyBtn');
      const day2Link = document.getElementById('day2Link');

      function renderDots() {
        dotsEl.innerHTML = '';
        for (let i = 0; i < steps.length; i++) {
          const d = document.createElement('span');
          d.className = 'dot' + (i === stepIndex ? ' on' : '');
          dotsEl.appendChild(d);
        }
      }

      function renderStep() {
        clearTimeout(autoAdvanceTimer);
        const s = steps[stepIndex];
        stepTitleEl.textContent = s.title;
        gridEl.className = 'grid ' + (s.gridClass || '');
        gridEl.innerHTML = '';
        const current = choices[s.key];

        s.options.forEach((opt) => {
          const b = document.createElement('button');
          b.type = 'button';
          b.className = 'card' + (current === opt.value ? ' selected' : '');
          b.dataset.value = opt.value;
          if (s.key === 'country') b.dataset.country = opt.value;
          b.innerHTML =
            '<div><div class="name">' +
            opt.primary +
            '</div><div class="joke">' +
            opt.sub +
            '</div></div>';
          b.addEventListener('click', () => {
            choices[s.key] = opt.value;
            gridEl.querySelectorAll('.card').forEach((c) => c.classList.remove('selected'));
            b.classList.add('selected');
            nextBtn.disabled = false;
            clearTimeout(autoAdvanceTimer);
            autoAdvanceTimer = setTimeout(() => {
              if (stepIndex < steps.length - 1) { stepIndex++; renderStep(); }
              else { finish(); }
            }, 350);
          });
          gridEl.appendChild(b);
        });

        nextBtn.disabled = !choices[s.key];
        backBtn.style.visibility = stepIndex === 0 ? 'hidden' : 'visible';
        backBtn.disabled = stepIndex === 0;
        renderDots();
      }

      function finish() {
        const parts = {
          country: choices.country,
          hotel: choices.hotel,
          food: choices.food,
          sea: choices.sea,
          exc: choices.exc,
        };
        const code = P.encodeTripCode(parts);
        const sum = P.calcTripPrice(parts);
        codeOut.textContent = code;
        if (window.vibeCountUp) {
          window.vibeCountUp(priceOut, {
            from: 0,
            to: sum,
            direction: 'up',
            delay: 0,
            duration: 2,
            separator: ' ',
            prefix: '~',
            suffix: ' ₽',
            className: 'count-up-text',
            startWhen: false,
          });
        } else {
          priceOut.textContent = '~' + sum.toLocaleString('ru-RU') + ' ₽';
        }

        const url = new URL('day2.html', window.location.href);
        url.searchParams.set('code', code);
        url.searchParams.set('sum', String(sum));
        if (P.isPreviewUnlock(window.location.search)) url.searchParams.set('preview', '1');
        day2Link.href = url.toString();

        try {
          localStorage.setItem(
            P.STORAGE_KEYS.day1,
            JSON.stringify({ code: code, sum: sum, at: Date.now() })
          );
        } catch (_) {}

        flowEl.classList.add('hidden');
        resultEl.classList.remove('hidden');
        if (window.vibeConfetti) window.vibeConfetti();
      }

      nextBtn.addEventListener('click', () => {
        clearTimeout(autoAdvanceTimer);
        if (stepIndex < steps.length - 1) {
          stepIndex++;
          renderStep();
        } else {
          finish();
        }
      });

      backBtn.addEventListener('click', () => {
        clearTimeout(autoAdvanceTimer);
        if (stepIndex > 0) {
          stepIndex--;
          renderStep();
        }
      });

      copyBtn.addEventListener('click', async () => {
        const t = codeOut.textContent;
        try {
          await navigator.clipboard.writeText(t);
          copyBtn.textContent = '✓ Скопировано!';
          setTimeout(() => (copyBtn.textContent = 'Скопировать код'), 2000);
        } catch {
          copyBtn.textContent = 'Выдели код вручную 🙂';
        }
      });

      renderStep();
    })();
  </script>
</body>
</html>
