<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <!-- Фон: тёплый закатный градиент -->
  <defs>
    <linearGradient id="sunset" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fdba74;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#f9a8d4;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#fbbf24;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.4" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <clipPath id="horizon">
      <rect x="0" y="500" width="1920" height="580"/>
    </clipPath>
  </defs>
  
  <!-- Основной градиент -->
  <rect width="1920" height="1080" fill="url(#sunset)"/>
  
  <!-- Солнце -->
  <circle cx="960" cy="420" r="180" fill="url(#sun)" filter="url(#glow)"/>
  <circle cx="960" cy="420" r="140" fill="#fcd34d" opacity="0.5"/>
  
  <!-- Облака (мягкие) -->
  <ellipse cx="300" cy="280" rx="180" ry="60" fill="#ffffff" opacity="0.25"/>
  <ellipse cx="340" cy="300" rx="140" ry="50" fill="#ffffff" opacity="0.2"/>
  <ellipse cx="1500" cy="320" rx="200" ry="70" fill="#ffffff" opacity="0.2"/>
  <ellipse cx="1550" cy="340" rx="160" ry="55" fill="#ffffff" opacity="0.15"/>
  
  <!-- Океан: волны -->
  <g clip-path="url(#horizon)">
    <!-- Первая волна -->
    <path d="M0 600 Q240 560 480 600 T960 600 T1440 600 T1920 600 V1080 H0 Z" fill="#38bdf8" opacity="0.3"/>
    
    <!-- Вторая волна -->
    <path d="M0 640 Q280 600 560 640 T1120 640 T1680 620 V1080 H0 Z" fill="#0ea5e9" opacity="0.25"/>
    
    <!-- Третья волна -->
    <path d="M0 680 Q320 660 640 680 T1280 700 T1920 660 V1080 H0 Z" fill="#0284c7" opacity="0.2"/>
    
    <!-- Блик на воде -->
    <ellipse cx="960" cy="750" rx="400" ry="80" fill="#fef3c7" opacity="0.15"/>
  </g>
  
  <!-- Пальмы (силуэты) -->
  <g fill="#1e293b" opacity="0.35">
    <!-- Пальма 1 -->
    <path d="M150 720 L155 850 L150 900 L145 850 Z"/>
    <ellipse cx="150" cy="720" rx="120" ry="40" opacity="0.6"/>
    <ellipse cx="130" cy="730" rx="100" ry="35" opacity="0.5"/>
    <ellipse cx="170" cy="730" rx="100" ry="35" opacity="0.5"/>
    
    <!-- Пальма 2 -->
    <path d="M1720 740 L1725 870 L1720 920 L1715 870 Z"/>
    <ellipse cx="1720" cy="740" rx="130" ry="42" opacity="0.6"/>
    <ellipse cx="1695" cy="750" rx="105" ry="37" opacity="0.5"/>
    <ellipse cx="1745" cy="750" rx="105" ry="37" opacity="0.5"/>
  </g>
  
  <!-- Мягкий виньет -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0"/>
    <stop offset="70%" style="stop-color:#ffffff;stop-opacity:0"/>
    <stop offset="100%" style="stop-color:#000000;stop-opacity:0.15"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
